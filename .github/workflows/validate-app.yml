name: Validate app

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/validate-app.yml"
  push:
    branches:
      - "agent/**"
    paths:
      - "app/**"
      - ".github/workflows/validate-app.yml"

permissions:
  contents: read

concurrency:
  group: validate-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      INTERNAL_API_SECRET: ci-placeholder-internal-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Capture Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Typecheck Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log-${{ github.run_id }}
          path: app/typecheck.log
          if-no-files-found: error

      - name: Enforce Typecheck
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

      - name: Production build
        run: pnpm build
